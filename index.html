<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1 class="logo">MyPortfolio</h1>
    <nav>
      <a href="#about">About</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Hello, I'm a Developer</h2>
    <p>Minimal. Clean. Modern.</p>
    <button onclick="scrollToSection()">View Work</button>
  </section>

  <section id="about" class="section">
    <h2>About Me</h2>
    <p>I enjoy building clean and simple web experiences.</p>
  </section>

  <section id="projects" class="section">
    <h2>Projects</h2>

    <div class="grid">
      <div class="card">Project 1</div>
      <div class="card">Project 2</div>
      <div class="card">Project 3</div>
    </div>
  </section>

  <section id="contact" class="section">
    <h2>Contact</h2>
    <p>Email: example@email.com</p>
  </section>

  <footer>
    <p>© 2026 My Portfolio</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
