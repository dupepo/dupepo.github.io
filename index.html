<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, intial-scale=1.0">
    <title>Guide to F1</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
    <script src="https://kit.fontawesome.com/51b4b29303.js" crossorigin="anonymous"></script>
</head>

<body>

    <!-- Previous Button -->
    <button id="prev-btn">
        <i class="fa-solid fa-angle-left"></i>
    </button>

    <!-- Book -->
    <div id="book" class="book">

        <!-- Paper 1 -->
        <div id="p1" class="paper">
            <div class="front">
                <div id="f1" class="front-content">
                    <h1>Guide to F1</h1>
                    <img src="images/f1.jpg" alt="Guide to F1">
                </div> 
            </div>
            <div class="back">
                <div id="b1" class="back-content">
                    <h1>11 Teams</h1>
                </div> 
            </div>
        </div>

        <!-- Paper 2 -->
        <div id="p2" class="paper">
            <div class="front">
                <div id="f2" class="front-content">
                    <h1>Available</h1>
                </div> 
            </div>
            <div class="back">
                <div id="b2" class="back-content">
                    <h1>Drivers</h1>
                </div> 
            </div>
        </div>

        <!-- Paper 3 -->
        <div id="p3" class="paper">
            <div class="front">
                <div id="f3" class="front-content">
                    <h1>Reserve</h1>
                </div> 
            </div>
            <div class="back">
                <div id="b3" class="back-content">
                    <h1>24 GP</h1>
                </div> 
            </div>
        </div>

        <!-- Paper 4 -->
        <div id="p4" class="paper">
            <div class="front">
                <div id="f4" class="front-content">
                    <h1>3 Day Event</h1>
                </div> 
            </div>
            <div class="back">
                <div id="b4" class="back-content">
                    <h1>Tyres</h1>
                </div> 
            </div>
        </div>

        <!-- Paper 5 -->
        <div id="p5" class="paper">
            <div class="front">
                <div id="f5" class="front-content">
                    <h1>Weight</h1>
                </div> 
            </div>
            <div class="back">
                <div id="b5" class="back-content">
                    <h1>DRS</h1>
                </div> 
            </div>
        </div>

        <!-- Paper 6 -->
        <div id="p6" class="paper">
            <div class="front">
                <div id="f6" class="front-content">
                    <h1>And More</h1>
                </div> 
            </div>
            <div class="back">
                <div id="b6" class="back-content">
                    <h1>Points</h1>
                </div> 
            </div>
        </div>

        <!-- Paper 7 -->
        <div id="p7" class="paper">
            <div class="front">
                <div id="f7" class="front-content">
                    <h1>Team</h1>
                </div> 
            </div>
            <div class="back">
                <div id="b7" class="back-content">
                    <h1>WAGS</h1>
                </div> 
            </div>
        </div>

        <!-- Paper 8 -->
        <div id="p8" class="paper">
            <div class="front">
                <div id="f8" class="front-content">
                    <h1>Front 8</h1>
                </div> 
            </div>
            <div class="back">
                <div id="b8" class="back-content">
                    <h1>Back 8</h1>
                </div> 
            </div>
        </div>
    </div>
        
    <!-- Next Button -->
    <button id="next-btn">
        <i class="fa-solid fa-angle-right"></i>
    </button>
</body>
</html>
